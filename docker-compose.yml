services:
  liberchat-site:
    image: liberchat/liberchat-site:latest
    container_name: liberchat-site
    ports:
      - "8345:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
